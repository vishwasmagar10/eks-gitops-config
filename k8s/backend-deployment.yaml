apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 294069345642.dkr.ecr.ap-south-1.amazonaws.com/devops-backend:41f74eba25406add8d1d2d7ae6fe911542f6dfdc
          ports:
            - containerPort: 3000
